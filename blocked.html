<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page Blocked</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f3f4f6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:40px;
    border-radius:10px;
    width:520px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.icon{
    font-size:60px;
    margin-bottom:10px;
}

h1{
    color:#dc2626;
    margin-bottom:10px;
}

p{
    color:#374151;
    line-height:1.5;
}

.notice{
    margin-top:20px;
    padding:12px;
    background:#fff7ed;
    border:1px solid #fdba74;
    border-radius:6px;
    color:#9a3412;
    font-size:14px;
}

.footer{
    margin-top:25px;
    font-size:13px;
    color:#6b7280;
}
</style>
</head>

<body>

<div class="box">
    <div class="icon">🔒</div>

    <h1>Content Blocked</h1>

    <p>
        This website has been blocked by your parental control settings.
        Access to this page is not allowed on this device or network.
    </p>

    <div class="notice">
        ⚠️ This attempt to access a restricted page has been logged.
    </div>

    <div class="footer">
        If you believe this page was blocked in error, please contact the administrator.
    </div>
</div>

</body>
</html>
